<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alert Component</title>
  <style>
    /* Reset margins so it fits perfectly in the iframe */
    body { margin: 0; font-family: sans-serif; overflow: hidden; background: transparent; }
  </style>
</head>
<body>

  <div role="alert" aria-label="Warning" style="border-left:4px solid #ff9800;background:#fff8e1;padding:12px;border-radius:6px;display:flex;gap:12px;align-items:flex-start;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex:0 0 20px;margin-top:2px;">
      <path d="M12 2L2 20h20L12 2z" fill="#ffb74d" />
      <path d="M11 9h2v5h-2V9zm0 7h2v2h-2v-2z" fill="#5a3b00" />
    </svg>
    <div>
      <strong id="alert-title" style="display:block;color:#5a3b00;margin-bottom:6px;">Warning</strong>
      <p id="alert-text" style="margin:0;color:#5b4630;line-height:1.4;">Default text</p>
    </div>
  </div>

  <script>
    // 1. Grab the URL parameters
    const params = new URLSearchParams(window.location.search);
    
    // 2. Get specific parameters
    const tagParam = params.get('tag');
    const textParam = params.get('text');

    // 3. Apply the 'tag' parameter to the Title
    if (tagParam) {
      // Capitalize the first letter (e.g., 'warning' -> 'Warning')
      const formattedTitle = tagParam.charAt(0).toUpperCase() + tagParam.slice(1);
      document.getElementById('alert-title').innerText = formattedTitle;
    }

    // 4. Apply the 'text' parameter to the Paragraph
    if (textParam) {
      // This removes the quotes if you accidentally pass text="Lorem Ipsum" instead of text=Lorem Ipsum
      const cleanText = textParam.replace(/^["']|["']$/g, '');
      document.getElementById('alert-text').innerText = cleanText;
    }
  </script>

</body>
</html>
